ATM_VSCODE_DEFAULT_VERSION="1.118.1"
ATM_VSCODE_ARCH="linux-x64"
ATM_VSCODE_QUALITY="stable"

ATM_VSCODE_INSTALL_ROOT="$ATM_APPS_DIR/vscode"
ATM_VSCODE_CACHE_DIR="$ATM_DOWNLOAD_DIR/vscode"
ATM_VSCODE_MANIFEST_FILE="$ATM_MANIFEST_DIR/vscode.manifest"

ATM_VSCODE_VERSION_OPTIONS="1.118.1 1.118.0 1.117.0 1.116.0 1.115.0 1.114.0 1.113.0"

# Extension stack owned by the VS Code plugin.
ATM_VSCODE_EXTENSIONS_FILE="$ATM_PLUGIN_DIR/vscode/extensions.txt"

ATM_VSCODE_CREATE_CLI_LINK="1"
ATM_VSCODE_CLI_LINK="$HOME/.local/bin/code"

ATM_VSCODE_CREATE_DESKTOP_ENTRY="1"
ATM_VSCODE_DESKTOP_DIR="$HOME/.local/share/applications"